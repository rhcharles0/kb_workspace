<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Document</title>
    </head>
    <body>
        <h1>Hello World..!</h1>
        <!-- DOM 요소 렌더링 방해 되므로 아래 위치 
        1. head에 작성할 경우
        - html 파싱이 되던 중 스크립트를 먼저 실행
        -> DOM 요소가 생성되기 전에 실행되어 DOM 요소 조작시 문제가 생길 수 있음.
        => 따라서 주로 전역 설정이나 유틸리티 함수에 사용
        
        2. body에 작성할 경우
        - html이 전부 파싱된 후 스크립트 실행
        -> dom 요소에 안전하게 접근 가능
        -->
        <script>
            alert('Hello JavaScript..!');
        </script>
    </body>
</html>
